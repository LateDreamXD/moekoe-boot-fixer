name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: |
          pnpm build
          cp LICENSE dist/LICENSE
          mkdir plugin
          mkdir plugin/boot-fixer
          mv dist/* plugin/boot-fixer/
      - uses: TheDoctor0/zip-release@0.7.6
        with:
          directory: plugin
          filename: 'boot-fixer-${{ github.ref_name }}.zip'
      - uses: ncipollo/release-action@v1
        with:
          artifacts: 'plugin/boot-fixer-${{ github.ref_name }}.zip'
          draft: true
          name: 'Boot Fixer ${{ github.ref_name }}'
